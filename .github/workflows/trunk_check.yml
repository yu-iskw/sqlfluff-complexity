name: Trunk Check

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  trunk_check:
    name: Trunk Check Runner
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      checks: write # For trunk to post annotations
      contents: read # For repo checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          bash dev/setup.sh --deps "development"

      # Transient GitHub archive/CDN errors (e.g. HTTP 502 on plugins zip) can fail a single run.
      - name: Trunk Check
        id: trunk_check
        continue-on-error: true
        uses: trunk-io/trunk-action@v1

      - name: Trunk Check (retry)
        id: trunk_check_retry
        if: steps.trunk_check.outcome == 'failure'
        uses: trunk-io/trunk-action@v1

      - name: Enforce Trunk Check outcome
        if: always()
        run: |
          if [[ "${{ steps.trunk_check.outcome }}" == "success" ]]; then
            exit 0
          fi
          if [[ "${{ steps.trunk_check_retry.outcome }}" == "success" ]]; then
            exit 0
          fi
          exit 1
